<!DOCTYPE html>
<html lang="th" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conneronline - แพลตฟอร์มปล่อยเช่าเว็บไซต์ร้านค้า</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#3B82F6",    
                        dark: "#0B1120",       
                        accent: "#60A5FA",
                    },
                    fontFamily: {
                        sans: ['Prompt', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="font-sans min-h-screen flex flex-col antialiased">
    
    <!-- พื้นหลัง Animated Blobs ขยับได้ -->
    <div class="blob-container">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>
    
    <!-- เนื้อหาทั้งหมด -->
    <div id="app" class="flex flex-col flex-grow relative z-10 w-full"></div>

    <!-- Components ของหน้าเว็บเช่าเว็บ (SaaS Platform) -->
    <script src="js/components/navbar.js"></script>
    <script src="js/components/hero.js"></script>
    <script src="js/components/features.js"></script>
    <script src="js/components/pricing.js"></script>
    <script src="js/components/footer.js"></script>
    
    <!-- App Logic -->
    <script src="js/app.js"></script>
</body>
</html>
